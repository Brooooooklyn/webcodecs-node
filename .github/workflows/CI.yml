name: CI
env:
  DEBUG: napi:*
  WEBCODECS_LOG: 'info'
  APP_NAME: webcodecs
  MACOSX_DEPLOYMENT_TARGET: '10.13'
  CARGO_INCREMENTAL: '1'
permissions: {}
'on':
  push:
    branches:
      - main
    tags-ignore:
      - '**'
    paths-ignore:
      - '**/*.md'
      - LICENSE
      - '**/*.gitignore'
      - .editorconfig
      - docs/**
  pull_request: null
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Format
        run: pnpm oxfmt --check

      - name: Cargo fmt
        run: cargo fmt -- --check

      - name: Setup libc++ static library
        run: sudo apt install -y libc++-dev libc++abi-dev

      - name: Clippy
        run: cargo clippy

  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # macOS - FFmpeg auto-downloaded by build.rs
          - host: macos-15-intel
            target: x86_64-apple-darwin
            build: |
              clang --version
              export CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER=clang
              export CC=clang
              pnpm build --target x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
            build: |
              clang --version
              export CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER=clang
              export CC=clang
              pnpm build --target aarch64-apple-darwin
          # Windows - FFmpeg auto-downloaded by build.rs
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: pnpm build --target x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: pnpm build --target aarch64-pc-windows-msvc
          # Linux glibc - FFmpeg auto-downloaded by build.rs
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: pnpm build --target x86_64-unknown-linux-gnu --use-napi-cross
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            build: pnpm build --target aarch64-unknown-linux-gnu --use-napi-cross
          # Linux musl - FFmpeg auto-downloaded by build.rs
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: pnpm build --target x86_64-unknown-linux-musl -x
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: pnpm build --target aarch64-unknown-linux-musl -x
    name: stable - ${{ matrix.settings.target }} - node@24
    runs-on: ${{ matrix.settings.host }}
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}
      - uses: mlugg/setup-zig@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        with:
          version: 0.15.2
      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild
      - name: Setup toolchain
        run: ${{ matrix.settings.setup }}
        if: ${{ matrix.settings.setup }}
        shell: bash
      - name: Install build tools (macOS)
        if: ${{ contains(matrix.settings.target, 'apple') }}
        run: |
          brew install llvm@20
          echo "$(brew --prefix llvm@20)/bin" >> $GITHUB_PATH
      - name: Setup libc++ and compiler-rt static libraries
        if: ${{ endsWith(matrix.settings.target, 'unknown-linux-gnu') }}
        run: |
          # Install libc++ for C++ runtime and libclang-rt for aarch64 outline atomics
          # Note: GCC's libatomic does NOT work - it uses __atomic_* symbols,
          # but LLVM generates __aarch64_* symbols (incompatible ABIs)
          sudo apt install -y libc++-dev libc++abi-dev libclang-rt-18-dev
          # prevent dynamic linking to libc++
          sudo rm -f /usr/lib/llvm-18/lib/libc++abi.so
          sudo rm -f /usr/lib/llvm-18/lib/libc++.so
          sudo rm -f /usr/lib/llvm-18/lib/libunwind.so
      - name: Remove .so files on arm64 host
        if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo rm -f /usr/lib/aarch64-linux-gnu/libc++abi.so
          sudo rm -f /usr/lib/aarch64-linux-gnu/libc++.so
          sudo rm -f /usr/lib/aarch64-linux-gnu/libunwind.so
      - name: Remove .so files on x86_64 host
        if: matrix.settings.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo rm -f /usr/lib/x86_64-linux-gnu/libc++abi.so
          sudo rm -f /usr/lib/x86_64-linux-gnu/libc++.so
          sudo rm -f /usr/lib/x86_64-linux-gnu/libunwind.so

      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        if: matrix.settings.target != 'wasm32-wasip1-threads'
        with:
          subject-path: '*.node'
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        if: matrix.settings.target != 'wasm32-wasip1-threads'
        with:
          name: bindings-${{ matrix.settings.target }}
          path: '*.node'
          if-no-files-found: error

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        with:
          name: bindings-${{ matrix.settings.target }}
          path: '*.wasm'
          if-no-files-found: error

  # Build armv7 separately using debian:bullseye container with GCC cross-toolchain
  # This matches the FFmpeg build environment exactly (ffmpeg-build.yml)
  build-armv7:
    name: stable - armv7-unknown-linux-gnueabihf - node@24
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    container:
      image: debian:bullseye-20260406

    steps:
      - name: Setup tools
        run: |
          apt-get update
          apt-get install -y \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
            libc6-dev-armhf-cross libatomic1-armhf-cross \
            git build-essential pkg-config \
            curl ca-certificates

      - uses: actions/checkout@v6

      - name: Config git
        run: git config --global --add safe.directory "$(pwd)"

      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.x'

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-gnueabihf

      - name: Install dependencies
        run: pnpm install

      - name: Build
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          export CC=arm-linux-gnueabihf-gcc
          export CXX=arm-linux-gnueabihf-g++
          export AR=arm-linux-gnueabihf-ar
          export RANLIB=arm-linux-gnueabihf-ranlib
          export CFLAGS="-march=armv7-a -mfpu=neon -mfloat-abi=hard"
          export CXXFLAGS="-march=armv7-a -mfpu=neon -mfloat-abi=hard"
          export CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc
          pnpm build --target armv7-unknown-linux-gnueabihf

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: '*.node'

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-armv7-unknown-linux-gnueabihf
          path: '*.node'
          if-no-files-found: error

  test-macOS-windows-binding:
    name: Test bindings on ${{ matrix.settings.target }} - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64
          - host: windows-11-arm
            target: aarch64-pc-windows-msvc
            architecture: arm64
          - host: macos-latest
            target: x86_64-apple-darwin
            architecture: x64
          - host: macos-latest
            target: aarch64-apple-darwin
            architecture: arm64
        node:
          - '22'
          - '24'
          - 'bun'
        exclude:
          - settings:
              target: aarch64-pc-windows-msvc
            node: 'bun'
          - settings:
              target: x86_64-apple-darwin
            node: 'bun'
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup node
        uses: actions/setup-node@v6
        if: ${{ matrix.node != 'bun' }}
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          architecture: ${{ matrix.settings.architecture }}
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        if: ${{ matrix.node == 'bun' }}
        with:
          bun-version: latest
      - name: Install dependencies
        run: pnpm install
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: bindings-${{ matrix.settings.target }}
          path: .
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Test bindings
        if: ${{ matrix.node != 'bun' }}
        run: pnpm test
      - name: Test bindings on bun
        if: ${{ matrix.node == 'bun' }}
        continue-on-error: true
        run: bun --bun run test
  test-linux-binding:
    name: Test ${{ matrix.target }} - node@${{ matrix.node }}
    needs:
      - build
      - build-armv7
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          # disable armv7 because it's too slow
          # - armv7-unknown-linux-gnueabihf
        node:
          - '22'
    runs-on: ${{ contains(matrix.target, 'aarch64') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: Output docker params
        id: docker
        run: |
          node -e "
            if ('${{ matrix.target }}'.startsWith('aarch64')) {
              console.log('PLATFORM=linux/arm64')
            } else if ('${{ matrix.target }}'.startsWith('armv7')) {
              console.log('PLATFORM=linux/arm/v7')
            } else {
              console.log('PLATFORM=linux/amd64')
            }
          " >> $GITHUB_OUTPUT
          node -e "
            if ('${{ matrix.target }}'.endsWith('-musl')) {
              console.log('IMAGE=node:${{ matrix.node }}-alpine')
            } else {
              console.log('IMAGE=node:${{ matrix.node }}-slim')
            }
          " >> $GITHUB_OUTPUT
          echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      # use --force to download the all platform/arch dependencies
      - name: Install dependencies
        run: pnpm install --force
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: bindings-${{ matrix.target }}
          path: .
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        if: ${{ contains(matrix.target, 'armv7') }}
        with:
          platforms: all
      - run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
        if: ${{ contains(matrix.target, 'armv7') }}
      - name: Test bindings
        uses: tj-actions/docker-run@v2
        with:
          image: ${{ steps.docker.outputs.IMAGE }}
          name: test-bindings-${{ matrix.target }}
          options: -e WEBCODECS_LOG=${{ env.WEBCODECS_LOG }} -v ${{ steps.docker.outputs.PNPM_STORE_PATH }}:${{ steps.docker.outputs.PNPM_STORE_PATH }} -v ${{ github.workspace }}:${{ github.workspace }} -w ${{ github.workspace }} --platform ${{ steps.docker.outputs.PLATFORM }}
          args: npm run test
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    needs:
      - lint
      - test-macOS-windows-binding
      - test-linux-binding
    steps:
      - uses: actions/checkout@v6
      - name: setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: create npm dirs
        run: pnpm napi create-npm-dirs
      - name: Move artifacts
        run: pnpm artifacts
      - name: List packages
        run: ls -R ./npm
        shell: bash
      - name: Publish
        run: |
          npm install -g npm
          npm config set provenance true
          if git log -1 --pretty=%B | grep "^v\?[0-9]\+\.[0-9]\+\.[0-9]\+$";
          then
            npm publish --access public
          elif git log -1 --pretty=%B | grep "^v\?[0-9]\+\.[0-9]\+\.[0-9]\+";
          then
            npm publish --tag next --access public
          else
            echo "Not a release, skipping publish"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
